{{ define "main" }}

<div class="about-intro">
  {{ $image := resources.Get "images/profile.jpg" }}
  {{ if $image }}
    {{ $optimized := $image.Resize "400x webp q85" }}
    <img src="{{ $optimized.RelPermalink }}" alt="Nagendra S Kamath" class="about-photo">
  {{ end }}

  <div class="about-text">
    {{ .Content }}
  </div>
</div>

{{ end }}
