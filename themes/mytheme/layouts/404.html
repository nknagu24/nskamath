<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | {{ .Site.Title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Bonheur+Royale&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header>
    <a href="/" class="site-title">{{ .Site.Title }}</a>
    <nav>
      <a href="/">Home</a>
      <a href="/about/">About</a>
      <a href="/academics/">Academics</a>
      <a href="/blog/">Personal Blog</a>
    </nav>
  </header>

  <main>
    <div class="error-page">
      <div class="error-code">404</div>
      <div class="error-title">Page Not Found</div>
      <p class="error-desc">The page you are looking for doesn't exist or has been moved.</p>
      <a href="/" class="error-btn">Go Home</a>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <div class="footer-tagline">Let there be light.</div>
      <div class="footer-bottom">
        <p>© {{ now.Year }} {{ .Site.Title }}</p>
      </div>
    </div>
  </footer>

</body>
</html>
